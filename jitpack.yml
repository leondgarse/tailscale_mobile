jdk:
  - openjdk17
before_install:
  - sdk install java 17.0.0-open
  # Download prebuilt libtailscale.so from the matching GitHub release tag
  - mkdir -p android/lib/src/main/jniLibs/arm64-v8a
  - curl -fL "https://github.com/leondgarse/tailscale_mobile/releases/download/${VERSION}/libtailscale_android_arm64.so"
      -o android/lib/src/main/jniLibs/arm64-v8a/libtailscale.so
build:
  - ./gradlew :lib:assembleRelease :lib:publishToMavenLocal
