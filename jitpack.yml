jdk:
  - openjdk17
before_install:
  - mkdir -p android/lib/src/main/jniLibs/arm64-v8a
  - curl -fL "https://github.com/leondgarse/tailscale_mobile/releases/download/${VERSION}/libtailscale.so" -o android/lib/src/main/jniLibs/arm64-v8a/libtailscale.so
build:
  - ./gradlew :lib:assembleRelease :lib:publishToMavenLocal
